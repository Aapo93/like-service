server:
  port: 8082
spring:
  application:
    name: like-service
  profiles:
    active: dev
  config:
    import:
      - nacos:shared-log.yaml?group=DEFAULT_GROUP&refreshEnable=true
      - nacos:shared-openfeign.yaml?group=DEFAULT_GROUP
  cloud:
    nacos:
      username: nacos
      password: 123456
      server-addr: localhost:8848
      discovery:
        namespace: resource-like
      config:
        namespace: resource-like
  data:
    redis:
      host: localhost
      port: 6379